# Build + publish the Python packages to PyPI:
#   - mnestic                              (pyo3 binding, cross-platform abi3 wheels)
#   - langchain-mnestic                    (pure Python)
#   - llama-index-vector-stores-mnestic    (pure Python)
#
# Publishing uses PyPI **trusted publishing** (OIDC) — no API tokens. Each of the
# three PyPI projects must have a trusted publisher configured pointing at this
# repo, workflow file `python-publish.yml`, environment `pypi`.
#
# Triggered by `py-v*` tags (and manually). Build-only on workflow_dispatch unless
# `publish=true` is passed.

name: python-publish

on:
  push:
    tags: ["py-v*"]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to PyPI (else build artifacts only)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  # --- lint + test gate: a broken engine must not ship ---
  # The mnestic wheel wraps the Rust engine (cozo-lib-python/src/lib.rs), so its
  # correctness gate is the engine test suite — same default/sqlite features and
  # action versions as build.yml's `test`/`clippy` jobs. All build + publish jobs
  # depend on this, so a tag push runs the gate before any artifact is uploaded.
  test:
    name: test + clippy (mnestic engine)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build -p mnestic --verbose
      - name: Test (lib + integration, incl. fork regressions)
        run: cargo test -p mnestic --verbose
      - name: Clippy (-D warnings)
        run: cargo clippy -p mnestic -- -D warnings

  # --- mnestic binding: cross-platform abi3 wheels via maturin ---
  build-mnestic:
    name: build mnestic (${{ matrix.platform.target }} / ${{ matrix.platform.os }})
    needs: [test]
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { os: ubuntu-latest,  target: x86_64,  manylinux: "2014" }
          # aarch64 needs the 2_28 image: the manylinux2014 cross-GCC is too old
          # to assemble ring's ARM asm (#error "ARM assembler must define __ARM_ARCH").
          - { os: ubuntu-latest,  target: aarch64, manylinux: "2_28" }
          # Intel-mac runners (macos-13) are retired — jobs queue forever.
          # Cross-compile x86_64 on the arm64 runner instead (the binding's
          # compact feature is pure Rust + cc, so the cross-build is safe).
          - { os: macos-14,       target: x86_64 }
          - { os: macos-14,       target: aarch64 }
          - { os: windows-latest, target: x64 }
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: cozo-lib-python
          target: ${{ matrix.platform.target }}
          manylinux: ${{ matrix.platform.manylinux }}
          # pyproject [tool.maturin] already pins no-default-features + features=compact.
          args: --release --out dist --compatibility pypi
      - uses: actions/upload-artifact@v4
        with:
          name: mnestic-wheels-${{ matrix.platform.os }}-${{ matrix.platform.target }}
          path: cozo-lib-python/dist

  build-mnestic-sdist:
    name: build mnestic sdist
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: cozo-lib-python
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: mnestic-sdist
          path: cozo-lib-python/dist

  # --- pure-Python adapter packages ---
  build-adapters:
    name: build ${{ matrix.pkg }}
    needs: [test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pkg: [langchain-mnestic, llama-index-vector-stores-mnestic]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pipx run build --outdir dist
        working-directory: cozo-lib-python/integrations/${{ matrix.pkg }}
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.pkg }}
          path: cozo-lib-python/integrations/${{ matrix.pkg }}/dist

  # --- publish (OIDC trusted publishing); one job per PyPI project ---
  publish-mnestic:
    needs: [build-mnestic, build-mnestic-sdist]
    if: github.event_name == 'push' || inputs.publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      # Guard: the triggering tag (py-vX.Y.Z) must match the published manifest
      # version. workflow_dispatch runs have no tag, so the check is skipped (a
      # manual dispatch is build/publish-on-demand and must not hard-fail here).
      - name: Verify tag matches manifest version
        run: |
          MANIFEST_VERSION="$(python3 -c "import tomllib; print(tomllib.load(open('cozo-lib-python/pyproject.toml','rb'))['project']['version'])")"
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "workflow_dispatch run (ref=${{ github.ref }}): no tag to check; manifest version is $MANIFEST_VERSION. Skipping tag/version match guard."
            exit 0
          fi
          TAG_VERSION="${GITHUB_REF#refs/tags/py-v}"
          echo "Tag version:      $TAG_VERSION"
          echo "Manifest version: $MANIFEST_VERSION"
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag py-v$TAG_VERSION does not match cozo-lib-python/pyproject.toml version $MANIFEST_VERSION. Bump the manifest (and Cargo.toml/Cargo.lock) to match the tag before releasing."
            exit 1
          fi
          echo "Version match OK."
      - uses: actions/download-artifact@v4
        with:
          pattern: "mnestic-*"
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true

  publish-langchain-mnestic:
    needs: [build-adapters]
    if: github.event_name == 'push' || inputs.publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with: { name: dist-langchain-mnestic, path: dist }
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true

  publish-llama-index-vector-stores-mnestic:
    needs: [build-adapters]
    if: github.event_name == 'push' || inputs.publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with: { name: dist-llama-index-vector-stores-mnestic, path: dist }
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
