name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (mnestic, default/sqlite features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Default features are SQLite-only, so no RocksDB submodule / C++ build is
      # needed here — keeps the correctness gate fast. RocksDB is covered below.
      - name: Build
        run: cargo build -p mnestic --verbose
      - name: Test (lib + integration, incl. fork regressions)
        run: cargo test -p mnestic --verbose
      # The `test-hooks` commit fence is only reachable from outside the crate
      # when its feature is on, so the default job above never compiles it.
      - name: Test (test-hooks commit fence)
        run: cargo test -p mnestic --features test-hooks --test commit_fence --verbose

  rocksdb:
    name: build (storage-rocksdb, C++ bridge)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build with RocksDB backend
        run: cargo build -p mnestic --features storage-rocksdb --verbose
      # The graph-projection freshness protocol has race windows that mem and
      # sqlite cannot reach: both pin a read transaction by holding a store-wide
      # read guard, so no writer can run alongside a long-lived reader. RocksDB
      # pins with a snapshot and takes no such guard. This is the only job that
      # can run the interleaving suite.
      - name: Test (graph-projection interleaving)
        run: cargo test -p mnestic --features storage-rocksdb,test-hooks --test graph_projection_interleaving --verbose

  clippy:
    name: clippy (blocking, -D warnings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Blocking lint gate on default (SQLite) features — fast, no C++ build.
      # Inherited upstream lints (missing_docs, dead_code, mutable_key_type, ...)
      # are allow-listed with rationale in cozo-core/src/lib.rs, so this gate
      # catches NEW clippy issues. `cargo fmt --check` is intentionally NOT part
      # of the gate yet: the inherited tree isn't rustfmt-clean and reformatting
      # ~178 mostly-upstream files is deferred to a dedicated pass.
      - name: Clippy
        run: cargo clippy -p mnestic -- -D warnings
