name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (mnestic, default/sqlite features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Default features are SQLite-only, so no RocksDB submodule / C++ build is
      # needed here — keeps the correctness gate fast. RocksDB is covered below.
      - name: Build
        run: cargo build -p mnestic --verbose
      - name: Test (lib + integration, incl. fork regressions)
        run: cargo test -p mnestic --verbose

  rocksdb:
    name: build (storage-rocksdb, C++ bridge)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build with RocksDB backend
        run: cargo build -p mnestic --features storage-rocksdb --verbose

  # NOTE: a `lint` job (cargo fmt --check + clippy) is intentionally omitted for
  # now. The inherited upstream tree is not rustfmt-clean and carries ~168 clippy
  # warnings, so the job could only ever be informational/red. Rather than ship a
  # perpetually-failing (even if non-blocking) check, we defer it to a dedicated
  # formatting + clippy cleanup pass, after which it returns as a BLOCKING gate.
